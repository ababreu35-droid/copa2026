<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Copa do Mundo 2026 – Tabela ao Vivo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-page:#07090f;--bg-surface:#0c1119;--bg-card:#101720;--bg-hover:#161f2e;
  --border:#182233;--border-mid:#1f3045;
  --text-1:#eef2f7;--text-2:#7d93ab;--text-3:#3f5570;
  --green:#1dd75b;--gold:#f0a500;--blue:#4a9eff;--red:#ef4444;--live:#ff3a3a;
  --green-dim:rgba(29,215,91,.1);--gold-dim:rgba(240,165,0,.1);
  --r-sm:8px;--r-md:12px;--r-lg:18px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  font-size:14px;line-height:1.5;color:var(--text-1);background:var(--bg-page);
  -webkit-font-smoothing:antialiased;
}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit;font-size:13px;border:none;border-radius:var(--r-sm);transition:all .2s}
button:disabled{opacity:.4;cursor:not-allowed}

/* LAYOUT */
.app{min-height:100vh;display:flex;flex-direction:column}
.main-content{flex:1;max-width:1100px;margin:0 auto;width:100%;padding:0 16px 56px}

/* HEADER — gradient premium */
.header{background:linear-gradient(135deg,#0a1520 0%,#0c1a10 50%,#0a1520 100%);border-bottom:1px solid rgba(29,215,91,.1);position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.header-inner{max-width:1100px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-title{display:flex;align-items:center;gap:14px}
.trophy{font-size:30px;line-height:1;filter:drop-shadow(0 0 8px rgba(240,165,0,.5))}
.header-title h1{font-size:21px;font-weight:800;letter-spacing:-.4px;background:linear-gradient(90deg,#eef2f7,#a8c5a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-sub{font-size:12px;color:var(--text-3);margin-top:2px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.last-upd{font-size:11px;color:var(--text-3)}

/* LIVE STATUS */
.live-status{display:flex;align-items:center;gap:8px;background:rgba(29,215,91,.07);border:1px solid rgba(29,215,91,.2);border-radius:999px;padding:5px 14px 5px 10px;box-shadow:0 0 12px rgba(29,215,91,.08)}
.live-label{font-size:12px;color:var(--green);font-weight:600}

/* DOTS */
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.pulse{background:var(--gold);animation:blink 1s ease-in-out infinite}
.dot.live-red{background:var(--live);width:7px;height:7px;animation:blink .8s ease-in-out infinite;box-shadow:0 0 5px var(--live)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* BUTTONS */
.btn-live{background:linear-gradient(135deg,#1dd75b,#16a34a);color:#000;font-weight:700;font-size:13px;padding:7px 18px;border-radius:999px;box-shadow:0 2px 12px rgba(29,215,91,.3)}
.btn-live:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-2);padding:4px 8px;font-size:16px;border-radius:var(--r-sm)}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text-1)}
.btn-primary{background:linear-gradient(135deg,#1dd75b,#16a34a);color:#000;font-weight:700;padding:9px 22px;border-radius:var(--r-sm)}
.btn-primary:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn-danger{background:rgba(239,68,68,.12);color:#fca5a5;padding:7px 14px;border-radius:var(--r-sm);font-size:12px}
.btn-danger:hover{background:rgba(239,68,68,.25)}

/* ERROR */
.error-banner{background:rgba(239,68,68,.08);border-bottom:1px solid rgba(239,68,68,.2);color:#fca5a5;padding:12px 16px;display:flex;align-items:flex-start;justify-content:center;gap:12px;font-size:13px;line-height:1.6;display:none;flex-wrap:wrap;text-align:center}
.error-banner.visible{display:flex}
.error-banner button{background:rgba(239,68,68,.18);color:#fca5a5;padding:4px 14px;border-radius:var(--r-sm);font-size:12px;flex-shrink:0}
.error-banner code{background:rgba(0,0,0,.3);padding:1px 6px;border-radius:4px;font-family:monospace;font-size:12px;color:#fde68a}
.error-banner a{color:#93c5fd}.error-banner strong{color:#fde68a}

/* VIEW NAV */
.view-nav{display:flex;gap:2px;border-bottom:1px solid var(--border);background:var(--bg-surface);padding:0 18px;position:sticky;top:61px;z-index:95}
.view-nav-inner{max-width:1100px;margin:0 auto;width:100%;display:flex;gap:0}
.view-btn{background:transparent;color:var(--text-3);font-size:13px;font-weight:600;padding:11px 20px;border-radius:0;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.01em}
.view-btn:hover{color:var(--text-1)}
.view-btn.active{color:var(--green);border-bottom-color:var(--green)}

/* TABS */
.tabs-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:24px;position:sticky;top:105px;background:var(--bg-page);z-index:90;padding-top:16px;padding-bottom:4px}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:6px;width:max-content}
.tab{background:var(--bg-card);color:var(--text-3);font-size:13px;font-weight:600;padding:7px 18px;border-radius:999px;border:1px solid var(--border);position:relative;display:flex;align-items:center;gap:5px;transition:all .2s}
.tab:hover{color:var(--text-1);border-color:var(--border-mid);background:var(--bg-hover)}
.tab.active{color:#000;background:linear-gradient(135deg,#1dd75b,#16a34a);border-color:transparent;font-weight:700;box-shadow:0 2px 12px rgba(29,215,91,.25)}
.tab.active .dot.live-red{filter:invert(1) brightness(0)}

/* GROUP VIEW */
.group-view{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.sec-title{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.note{font-size:11px;color:var(--text-3);margin-top:10px;line-height:1.5;padding:8px 12px;background:var(--bg-card);border-radius:var(--r-sm);border:1px solid var(--border)}

/* STANDINGS */
.std-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r-md);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.std-table{width:100%;border-collapse:collapse;font-size:13px}
.std-table th{background:var(--bg-surface);color:var(--text-3);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.07em;padding:10px 8px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--border)}
.std-table th.c-team{text-align:left;padding-left:12px}
.std-table th.c-pts{color:var(--text-2)}
.std-table td{padding:11px 8px;text-align:center;border-bottom:1px solid var(--border);color:var(--text-2);transition:background .15s}
.std-table tr:last-child td{border-bottom:none}
.std-table td.c-team{text-align:left;min-width:140px;padding-left:0}
.std-table td.c-pts{font-weight:800;color:var(--text-1);font-size:15px}
.std-table tr:hover td{background:var(--bg-hover)}
/* Qualified rows — left accent border */
.row-q td:first-child{box-shadow:inset 3px 0 0 var(--green)}
.row-q td{background:rgba(29,215,91,.03)}
.row-q td.c-pts{color:var(--green)}
.row-p td:first-child{box-shadow:inset 3px 0 0 var(--blue)}
.row-p td{background:rgba(74,158,255,.03)}
.row-p td.c-pts{color:var(--blue)}
.row-o td{opacity:.55}
.pos-b{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:700}
.p1{background:rgba(240,165,0,.18);color:var(--gold)}
.p2{background:rgba(29,215,91,.14);color:var(--green)}
.p3{background:rgba(74,158,255,.14);color:var(--blue)}
.p4{background:var(--bg-hover);color:var(--text-3)}
.flag{margin-right:6px;font-size:16px;line-height:1}
.team-logo{width:22px;height:22px;object-fit:contain;margin-right:6px;flex-shrink:0}
.team-logo-sm{width:18px;height:18px;object-fit:contain;flex-shrink:0}
.team-logo-lg{width:32px;height:32px;object-fit:contain;flex-shrink:0}
.tname{display:inline}.tshort{display:none}
.sg-pos{color:var(--green);font-weight:600}.sg-neg{color:var(--red)}
/* Form pills */
.form-dots{display:flex;gap:3px;margin-left:6px}
.fd{display:inline-block;width:8px;height:8px;border-radius:50%}
.fd-w{background:var(--green)}.fd-d{background:var(--gold)}.fd-l{background:var(--text-3)}

/* MATCHES */
.match-list{display:flex;flex-direction:column;gap:16px}
.round-section{display:flex;flex-direction:column;gap:8px}
.round-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);margin-bottom:2px;display:flex;align-items:center;gap:8px}
.round-label::after{content:'';flex:1;height:1px;background:var(--border)}
.match-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 16px;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.match-card:hover{border-color:var(--border-mid);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.match-card.is-live{border-color:rgba(255,58,58,.35);background:linear-gradient(135deg,rgba(255,58,58,.06),var(--bg-card));box-shadow:0 0 20px rgba(255,58,58,.12)}
.match-info{font-size:11px;color:var(--text-3);margin-bottom:7px}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:var(--live);letter-spacing:.06em;margin-bottom:7px}
.match-row{display:flex;align-items:center;gap:10px}
.m-team{flex:1;display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text-2);min-width:0}
.m-team-away{flex-direction:row-reverse;text-align:right}
.m-team.winner{color:var(--text-1);font-weight:700}
.m-tname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-tshort{display:none}
.m-score{display:flex;align-items:center;gap:4px;font-size:20px;font-weight:800;color:var(--text-1);min-width:72px;justify-content:center;flex-shrink:0}
.score-sep{color:var(--text-3);font-weight:300;font-size:16px}
.score-w{color:var(--green)}
.score-time{font-size:13px;color:var(--text-2);font-weight:600;background:var(--bg-hover);padding:3px 8px;border-radius:999px}
.match-goals{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px 14px;font-size:11px;color:var(--text-2);padding-top:6px;border-top:1px solid var(--border)}
.mg{display:flex;align-items:center;gap:3px}
.mg-home{color:var(--text-1)}
.mg-away{color:var(--text-2)}
.match-venue{margin-top:5px;font-size:10px;color:var(--text-3);display:flex;align-items:center;gap:4px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(6px);display:none}
.overlay.open{display:flex}
.modal{background:var(--bg-surface);border:1px solid var(--border-mid);border-radius:var(--r-lg);width:100%;max-width:480px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:16px;font-weight:700}
.modal-body{padding:22px;display:flex;flex-direction:column;gap:16px}
.modal-body p{color:var(--text-2);font-size:13px;line-height:1.7}
.steps{list-style:decimal;padding-left:20px;display:flex;flex-direction:column;gap:6px;color:var(--text-2);font-size:13px}
.modal-form{display:flex;flex-direction:column;gap:10px}
.modal-form label{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.07em}
.modal-form input{background:var(--bg-card);border:1px solid var(--border-mid);border-radius:var(--r-sm);color:var(--text-1);font-size:14px;font-family:monospace;padding:11px 14px;outline:none;transition:border-color .2s;width:100%}
.modal-form input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,215,91,.1)}
.modal-form input::placeholder{color:var(--text-3)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}
.modal-note{font-size:11px;color:var(--text-3);border-top:1px solid var(--border);padding-top:14px}

/* TODAY SECTION */
.today-section{margin:24px 0 0;padding-bottom:28px;border-bottom:1px solid var(--border)}
.today-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.today-title{font-size:16px;font-weight:800;color:var(--text-1);display:flex;align-items:center;gap:8px}
.today-date{font-size:12px;color:var(--text-3);background:var(--bg-card);padding:2px 10px;border-radius:999px;border:1px solid var(--border)}
.today-none{font-size:13px;color:var(--text-3);padding:16px;background:var(--bg-card);border-radius:var(--r-md);border:1px dashed var(--border);text-align:center}
.today-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.today-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.today-card:hover{border-color:var(--border-mid);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
.today-card.is-live{border-color:rgba(255,58,58,.4);background:linear-gradient(135deg,rgba(255,58,58,.07),var(--bg-card));box-shadow:0 0 24px rgba(255,58,58,.15)}
.today-card.is-finished{opacity:.7}
.today-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.today-group-badge{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--text-3);background:var(--bg-hover);padding:3px 8px;border-radius:6px;border:1px solid var(--border)}
.today-status{font-size:11px;font-weight:700}
.today-status.live{color:var(--live);display:flex;align-items:center;gap:5px}
.today-status.finished{color:var(--text-3)}
.today-status.scheduled{color:var(--text-2)}
.today-match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.today-team{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text-2);min-width:0}
.today-team.right{flex-direction:row-reverse;text-align:right}
.today-team.winner{color:var(--text-1);font-weight:700}
.today-team-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.today-venue{margin-top:8px;font-size:10px;color:var(--text-3)}
.today-score{display:flex;align-items:center;justify-content:center;gap:4px;font-size:22px;font-weight:800;color:var(--text-1);min-width:68px}
.today-score .sep{color:var(--text-3);font-weight:300;font-size:18px}
.today-score .sw{color:var(--green)}
.today-score .time{font-size:14px;font-weight:700;color:var(--text-2);background:var(--bg-hover);padding:4px 10px;border-radius:999px;font-size:13px}

/* LIVE NOW BANNER */
.live-now-section{margin:24px 0 0;display:none}
.live-now-section.visible{display:block}
.live-now-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--live);display:flex;align-items:center;gap:7px;margin-bottom:12px}
.live-now-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
/* rich live card */
.live-now-card{background:linear-gradient(160deg,#1a0f0f,#1c1018);border:1px solid rgba(255,58,58,.45);border-radius:var(--r-md);overflow:hidden;cursor:pointer;transition:all .25s;box-shadow:0 4px 24px rgba(255,58,58,.12)}
.live-now-card:hover{border-color:rgba(255,58,58,.75);transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,58,58,.22)}
.ln-header{background:rgba(255,58,58,.18);padding:8px 14px;display:flex;align-items:center;justify-content:space-between}
.ln-live-pill{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.09em;color:var(--live)}
.ln-period{font-size:11px;font-weight:700;color:var(--text-2);background:rgba(255,255,255,.07);padding:3px 9px;border-radius:999px;letter-spacing:.04em}
.ln-elapsed{font-size:22px;font-weight:900;color:var(--live);letter-spacing:-1px;line-height:1}
.ln-elapsed small{font-size:13px;font-weight:700;color:var(--text-2);margin-left:2px}
/* score area */
.ln-score-area{padding:18px 16px 14px;display:flex;align-items:center;gap:10px}
.ln-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0}
.ln-team-crest{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.ln-team-flag{font-size:32px;line-height:1}
.ln-team-name{font-size:12px;font-weight:700;color:var(--text-1);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px}
.ln-team-short{font-size:16px;font-weight:900;letter-spacing:.05em;color:var(--text-1)}
.ln-score-center{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:90px}
.ln-score-main{font-size:48px;font-weight:900;letter-spacing:-3px;color:#fff;line-height:1;display:flex;align-items:center;gap:4px}
.ln-score-sep{font-size:32px;font-weight:300;color:rgba(255,255,255,.35);margin:0 2px}
.ln-score-ht{font-size:11px;color:var(--text-3);background:rgba(255,255,255,.06);padding:2px 8px;border-radius:999px;white-space:nowrap}
/* meta row */
.ln-meta{padding:0 16px 14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.ln-meta-chip{font-size:11px;color:var(--text-3);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:3px 9px;border-radius:999px;display:flex;align-items:center;gap:4px;white-space:nowrap}
/* mini group table */
.ln-table-wrap{padding:0 14px 14px}
.ln-table-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
.ln-table{width:100%;border-collapse:collapse;font-size:12px}
.ln-table td{padding:4px 5px;color:var(--text-2)}
.ln-table tr.ln-playing td{color:var(--text-1);font-weight:700}
.ln-table tr.ln-playing td:first-child{color:var(--live)}
.ln-table td:first-child{width:18px;text-align:center;font-size:11px;color:var(--text-3)}
.ln-table td:nth-child(2){display:flex;align-items:center;gap:5px}
.ln-table td:last-child,.ln-table td:nth-child(3){text-align:center;font-weight:700;color:var(--text-1)}
.ln-table tr:not(:last-child) td{border-bottom:1px solid rgba(255,255,255,.05)}
/* events (gols/cartões) */
.ln-events{padding:0 14px 14px;border-top:1px solid rgba(255,255,255,.07);margin-top:2px}
.ln-events-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);padding-top:10px;margin-bottom:7px}
.ln-event{display:flex;align-items:center;gap:7px;font-size:12px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ln-event:last-child{border-bottom:none}
.ln-event-min{font-size:11px;font-weight:700;color:var(--text-3);min-width:30px;text-align:right}
.ln-event-icon{font-size:14px;line-height:1;min-width:18px;text-align:center}
.ln-event-name{flex:1;color:var(--text-1);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ln-event-team{font-size:11px;color:var(--text-3);background:rgba(255,255,255,.06);padding:1px 6px;border-radius:999px}

/* KNOCKOUT */
.knockout-view{display:none;flex-direction:column;gap:0;padding-top:8px}
.knockout-view.active{display:flex}

/* Round section */
.ko-phase{margin-bottom:32px}
.ko-phase-header{display:flex;align-items:center;gap:14px;padding:12px 16px;margin-bottom:16px;
  background:linear-gradient(90deg,rgba(240,165,0,.12) 0%,rgba(240,165,0,.04) 60%,transparent 100%);
  border-left:4px solid var(--gold);border-radius:0 var(--r-md) var(--r-md) 0}
.ko-phase-icon{font-size:22px;line-height:1;filter:drop-shadow(0 0 6px rgba(240,165,0,.4))}
.ko-phase-title{font-size:15px;font-weight:800;color:var(--text-1);letter-spacing:-.3px}
.ko-phase-count{font-size:11px;color:var(--text-3);font-weight:500;margin-left:auto;
  background:var(--bg-surface);border:1px solid var(--border);border-radius:999px;padding:2px 10px}

/* Phase accent colors */
.ko-phase.r32  .ko-phase-header{border-color:#4a9eff;background:linear-gradient(90deg,rgba(74,158,255,.1) 0%,transparent 70%)}
.ko-phase.r16  .ko-phase-header{border-color:#a855f7;background:linear-gradient(90deg,rgba(168,85,247,.1) 0%,transparent 70%)}
.ko-phase.qf   .ko-phase-header{border-color:#f97316;background:linear-gradient(90deg,rgba(249,115,22,.1) 0%,transparent 70%)}
.ko-phase.sf   .ko-phase-header{border-color:#eab308;background:linear-gradient(90deg,rgba(234,179,8,.12) 0%,transparent 70%)}
.ko-phase.final .ko-phase-header{border-color:var(--gold);background:linear-gradient(90deg,rgba(240,165,0,.16) 0%,transparent 70%)}
.ko-phase.r32  .ko-phase-title{color:#4a9eff}
.ko-phase.r16  .ko-phase-title{color:#a855f7}
.ko-phase.qf   .ko-phase-title{color:#f97316}
.ko-phase.sf   .ko-phase-title{color:#eab308}
.ko-phase.final .ko-phase-title{color:var(--gold)}

/* Cards grid */
.ko-grid{display:grid;gap:12px}
.ko-grid.g3{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.ko-grid.g2{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}
.ko-grid.g1{grid-template-columns:minmax(280px,540px)}
@media(max-width:600px){.ko-grid.g3,.ko-grid.g2,.ko-grid.g1{grid-template-columns:1fr}}

/* Card */
.ko-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);
  padding:0;overflow:hidden;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.ko-card:hover{border-color:var(--border-mid);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.ko-card.ko-live{border-color:rgba(255,58,58,.4);box-shadow:0 0 16px rgba(255,58,58,.15)}

/* Card top strip: date/time and venue */
.ko-card-top{padding:8px 14px;background:var(--bg-surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;min-height:32px}
.ko-date{font-size:11px;color:var(--text-3);font-weight:500}
.ko-venue{font-size:10px;color:var(--text-3);display:flex;align-items:center;gap:3px;max-width:55%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ko-live-badge{font-size:11px;font-weight:800;color:var(--live);display:flex;align-items:center;gap:5px}

/* Card body: teams + score */
.ko-match-body{padding:14px 16px 12px;display:flex;align-items:center;gap:10px}
.ko-team-block{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0;text-align:center}
.ko-team-block.right{}
.ko-crest{width:44px;height:44px;object-fit:contain;flex-shrink:0}
.ko-crest-flag{font-size:32px;line-height:1}
.ko-team-name{font-size:12px;color:var(--text-2);font-weight:600;line-height:1.2;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.ko-team-name.winner{color:var(--green);font-weight:700}
.ko-team-name.tbd{color:var(--text-3);font-style:italic;font-weight:400}

/* Score center */
.ko-score-center{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:72px}
.ko-score-big{font-size:26px;font-weight:900;color:var(--text-1);display:flex;align-items:center;gap:5px;letter-spacing:-1px}
.ko-score-big .sep{color:var(--text-3);font-weight:300;font-size:20px}
.ko-score-time{font-size:12px;color:var(--text-2);font-weight:700;background:var(--bg-hover);
  padding:4px 10px;border-radius:999px;white-space:nowrap}
.ko-score-win{color:var(--green)}

/* Final card special style */
.ko-card.final-card{border-color:rgba(240,165,0,.35);background:linear-gradient(135deg,rgba(240,165,0,.06),var(--bg-card));
  box-shadow:0 4px 24px rgba(240,165,0,.15)}

/* ─── ARTILHEIROS ──────────────────────────────────────────────── */
.scorers-view{display:none;flex-direction:column;gap:28px;padding-top:12px}
.scorers-view.active{display:flex}
/* Pódio top 3 */
.podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:12px;align-items:end;margin-bottom:4px}
.podium-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 12px 16px;text-align:center;position:relative;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.podium-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.podium-card.p1{border-color:rgba(240,165,0,.35);background:linear-gradient(180deg,rgba(240,165,0,.08) 0%,var(--bg-card) 60%);order:2}
.podium-card.p2{border-color:rgba(192,192,192,.25);background:linear-gradient(180deg,rgba(192,192,192,.05) 0%,var(--bg-card) 60%)}
.podium-card.p3{border-color:rgba(180,120,60,.25);background:linear-gradient(180deg,rgba(180,120,60,.05) 0%,var(--bg-card) 60%)}
.podium-medal{font-size:28px;line-height:1;margin-bottom:8px}
.podium-flag{font-size:32px;line-height:1;margin-bottom:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.podium-photo-wrap{position:relative;width:80px;height:80px;margin:0 auto 10px}
.podium-player-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border-mid);background:var(--bg-hover)}
.podium-team-badge-wrap{position:absolute;bottom:-4px;right:-4px;background:var(--bg-card);border-radius:50%;padding:2px;border:1px solid var(--border)}
.podium-team-badge{width:24px;height:24px;object-fit:contain;display:block}
.sc-player-photo{width:40px;height:40px;border-radius:50%;object-fit:cover;border:1px solid var(--border-mid);flex-shrink:0;background:var(--bg-hover)}
.sc-player-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg-hover);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--text-3);flex-shrink:0}
.podium-name{font-size:13px;font-weight:700;color:var(--text-1);margin-bottom:3px;line-height:1.3}
.podium-team{font-size:11px;color:var(--text-3);margin-bottom:12px}
.podium-goals{font-size:32px;font-weight:900;color:var(--text-1);line-height:1;letter-spacing:-1px}
.podium-goals-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.podium-goals span.g1{color:var(--gold)}
.podium-goals span.g2{color:#b0b8c0}
.podium-goals span.g3{color:#b47040}
.podium-assists{font-size:11px;color:var(--text-3);margin-top:8px}
.podium-assists strong{color:var(--blue)}
/* Tabela artilheiros */
.scorers-table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.scorers-table{width:100%;border-collapse:collapse}
.scorers-table th{background:var(--bg-surface);color:var(--text-3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:10px 12px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
.scorers-table th.c-player{text-align:left}
.scorers-table td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--text-2);text-align:center;font-size:13px;transition:background .15s}
.scorers-table tr:last-child td{border-bottom:none}
.scorers-table tr:hover td{background:var(--bg-hover)}
.sc-rank{font-size:13px;font-weight:700;color:var(--text-3);min-width:28px}
.sc-rank.top{color:var(--gold);font-size:16px}
.sc-player-cell{text-align:left!important;min-width:160px}
.sc-player-name{font-weight:600;color:var(--text-1);font-size:13px}
.sc-team{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:4px;margin-top:2px}
.sc-goals{font-size:16px;font-weight:800;color:var(--text-1)}
.sc-goals.leader{color:var(--gold)}
.sc-assists{font-size:13px;color:var(--blue);font-weight:600}
.sc-matches{font-size:12px;color:var(--text-3)}
.sc-bar{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.sc-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:2px;transition:width .6s ease}
/* RESPONSIVE */
@media(max-width:600px){
  .podium{grid-template-columns:1fr 1fr 1fr}
  .podium-flag{font-size:28px}
  .podium-goals{font-size:26px}
}

/* ─── VISUAL BRACKET ───────────────────────────────────────────── */
.bk-toggle{display:flex;gap:6px;margin-bottom:22px}
.bk-tbtn{background:var(--bg-card);border:1px solid var(--border);color:var(--text-3);padding:7px 20px;border-radius:999px;font-size:13px;font-weight:600;transition:all .2s}
.bk-tbtn:hover{color:var(--text-1);border-color:var(--border-mid)}
.bk-tbtn.active{background:linear-gradient(135deg,var(--gold),#c47f00);color:#000;border-color:transparent;font-weight:700;box-shadow:0 2px 12px rgba(240,165,0,.25)}

/* Scroll container */
.bk-scroll-wrap{position:relative}
.bk-scroll-hint{position:absolute;right:0;top:50%;transform:translateY(-50%);
  background:linear-gradient(90deg,transparent,rgba(7,9,15,.95));
  width:60px;height:100%;pointer-events:none;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.bk-scroll-hint-icon{font-size:18px;opacity:.5;animation:scrollHint 1.5s ease-in-out infinite}
@keyframes scrollHint{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
.bk-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:24px;cursor:grab;
  scrollbar-width:thin;scrollbar-color:var(--border-mid) transparent}
.bk-scroll::-webkit-scrollbar{height:4px}
.bk-scroll::-webkit-scrollbar-track{background:transparent}
.bk-scroll::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:2px}
.bk-root{display:inline-flex;align-items:stretch;gap:0;min-height:640px;padding:8px 4px}
.bk-half{display:flex;align-items:stretch}

/* Column */
.bk-col{display:flex;flex-direction:column;width:200px;flex-shrink:0}
.bk-gap{width:32px;flex-shrink:0;position:relative}

/* Pair: connector bracket lines */
.bk-pair{display:flex;flex-direction:column;flex:1;position:relative}
.bk-pair.L{border-right:2px solid rgba(74,158,255,.35);padding-right:10px}
.bk-pair.L::after{content:'';position:absolute;right:-32px;top:calc(50% - 1px);width:32px;height:2px;background:rgba(74,158,255,.35)}
.bk-pair.R{border-left:2px solid rgba(74,158,255,.35);padding-left:10px}
.bk-pair.R::after{content:'';position:absolute;left:-32px;top:calc(50% - 1px);width:32px;height:2px;background:rgba(74,158,255,.35)}
/* QF pairs */
.bk-pair.LQ{border-right:2px solid rgba(249,115,22,.4);padding-right:10px}
.bk-pair.LQ::after{content:'';position:absolute;right:-32px;top:calc(50% - 1px);width:32px;height:2px;background:rgba(249,115,22,.4)}
.bk-pair.RQ{border-left:2px solid rgba(249,115,22,.4);padding-left:10px}
.bk-pair.RQ::after{content:'';position:absolute;left:-32px;top:calc(50% - 1px);width:32px;height:2px;background:rgba(249,115,22,.4)}

.bk-slot{flex:1;display:flex;align-items:center;min-height:64px;padding:4px 0}
.bk-sf-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;position:relative}
.bk-sf-wrap.L::after{content:'';position:absolute;right:-32px;top:calc(50% - 1px);width:32px;height:2px;background:rgba(234,179,8,.5)}
.bk-sf-wrap.R::after{content:'';position:absolute;left:-32px;top:calc(50% - 1px);width:32px;height:2px;background:rgba(234,179,8,.5)}

/* Match card */
.bk-card{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0;transition:border-color .2s,box-shadow .2s}
.bk-card:hover{border-color:var(--border-mid);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.bk-card.bk-live{border-color:rgba(255,68,68,.5);background:linear-gradient(135deg,rgba(255,68,68,.06),var(--bg-card));box-shadow:0 0 12px rgba(255,68,68,.12)}
.bk-card.bk-done{border-color:var(--border-mid)}
.bk-card.bk-tbd{opacity:.45;border-style:dashed}
.bk-live-bar{font-size:10px;font-weight:800;color:var(--live);padding:3px 8px;display:flex;align-items:center;gap:4px;background:rgba(255,68,68,.08);letter-spacing:.04em}

/* Team row inside card */
.bk-trow{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;min-height:34px;gap:6px;font-size:12px;color:var(--text-2);transition:background .15s}
.bk-trow.winner{color:var(--text-1);font-weight:700;background:rgba(29,215,91,.08)}
.bk-trow.tbd{color:var(--text-3);font-style:italic}
.bk-ti{display:flex;align-items:center;gap:6px;overflow:hidden;flex:1;min-width:0}
.bk-tcrest{width:20px;height:20px;object-fit:contain;flex-shrink:0;border-radius:2px}
.bk-tfl{font-size:15px;flex-shrink:0;line-height:1}
.bk-tn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.bk-sc{font-size:14px;font-weight:800;flex-shrink:0;min-width:16px;text-align:right;color:var(--text-3)}
.bk-sc.gol{color:var(--green)}
.bk-time-bar{text-align:center;font-size:10px;color:var(--text-3);padding:2px 6px;background:var(--bg-surface);border-top:1px solid var(--border)}
.bk-div{height:1px;background:var(--border)}

/* Final center */
.bk-final-col{display:flex;flex-direction:column;align-items:center;justify-content:center;width:216px;padding:0 12px;flex-shrink:0;gap:6px}
.bk-final-lbl{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);text-align:center}
.bk-final-trophy{font-size:52px;line-height:1;margin:6px 0;filter:drop-shadow(0 0 12px rgba(240,165,0,.4))}
.bk-final-card{width:192px}
.bk-final-card .bk-trow{font-size:13px;min-height:38px;padding:8px 10px}
.bk-final-card .bk-sc{font-size:16px}
.bk-tp-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-top:14px;padding:4px 10px;background:var(--bg-surface);border-radius:999px;border:1px solid var(--border)}

/* Round label row */
.bk-round-wrap{display:flex;flex-direction:column}
.bk-round-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;
  text-align:center;margin-bottom:10px;height:20px;display:flex;align-items:center;justify-content:center;
  border-radius:999px;padding:0 8px}
.bk-round-lbl.r32{color:#4a9eff;background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.2)}
.bk-round-lbl.r16{color:#a855f7;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2)}
.bk-round-lbl.qf {color:#f97316;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2)}
.bk-round-lbl.sf {color:#eab308;background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.25)}
/* RESPONSIVE */
@media(max-width:768px){
  .group-view{grid-template-columns:1fr}
  .header-title h1{font-size:18px}
  .tname{display:none}.tshort{display:inline}
  .m-tname{display:none}.m-tshort{display:inline}
  .std-table td.c-team{min-width:80px}
  .today-grid{grid-template-columns:1fr}
  .live-now-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .std-table th:nth-child(5),.std-table td:nth-child(5),
  .std-table th:nth-child(8),.std-table td:nth-child(8),
  .std-table th:nth-child(9),.std-table td:nth-child(9){display:none}
  .main-content{padding:0 12px 48px}
  .header-inner{padding:12px 14px}
}
/* Scroll personalizado */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-surface)}
::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
</style>
</head>

<div class="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <div class="trophy">🏆</div>
        <div>
          <h1>Copa do Mundo 2026</h1>
          <p class="header-sub">EUA · Canadá · México · 11 jun – 19 jul</p>

      <button class="view-btn" id="vbtn-eliminatorias" onclick="setView('eliminatorias')">🏆 Eliminatórias</button>
      <button class="view-btn" id="vbtn-artilheiros" onclick="setView('artilheiros')">🥅 Artilheiros</button>

  <main class="main-content">

    <div id="groups-view">

        <div id="matches-col"></div>

</div>

<script>
// ─── DADOS ESTÁTICOS — apenas bandeiras (ESPN não fornece emojis) ────────────
const FLAG_MAP = {
  MEX:"🇲🇽",KOR:"🇰🇷",CZE:"🇨🇿",RSA:"🇿🇦",
  CAN:"🇨🇦",SUI:"🇨🇭",BIH:"🇧🇦",QAT:"🇶🇦",
  BRA:"🇧🇷",MAR:"🇲🇦",SCO:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",HAI:"🇭🇹",
  USA:"🇺🇸",AUS:"🇦🇺",PAR:"🇵🇾",TUR:"🇹🇷",
  GER:"🇩🇪",CIV:"🇨🇮",ECU:"🇪🇨",CUW:"🇨🇼",
  NED:"🇳🇱",SWE:"🇸🇪",JPN:"🇯🇵",TUN:"🇹🇳",
  BEL:"🇧🇪",EGY:"🇪🇬",IRN:"🇮🇷",NZL:"🇳🇿",
  ESP:"🇪🇸",CPV:"🇨🇻",KSA:"🇸🇦",URU:"🇺🇾",
  FRA:"🇫🇷",SEN:"🇸🇳",IRQ:"🇮🇶",NOR:"🇳🇴",
  ARG:"🇦🇷",ALG:"🇩🇿",AUT:"🇦🇹",JOR:"🇯🇴",
  POR:"🇵🇹",COD:"🇨🇩",UZB:"🇺🇿",COL:"🇨🇴",
  ENG:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",CRO:"🇭🇷",GHA:"🇬🇭",PAN:"🇵🇦",
};

// ─── ESPN API — sem proxy, CORS aberto ──────────────────────────────────────
const ESPN_BASE = 'https://site.api.espn.com/apis';
const ESPN_ALL  = `${ESPN_BASE}/site/v2/sports/soccer/fifa.world/scoreboard?limit=200&dates=20260611-20260719`;
const ESPN_ST   = `${ESPN_BASE}/v2/sports/soccer/fifa.world/standings`;
const ESPN_LIVE = `${ESPN_BASE}/site/v2/sports/soccer/fifa.world/scoreboard`;
const ESPN_SUM  = id => `${ESPN_BASE}/site/v2/sports/soccer/fifa.world/summary?event=${id}`;

const ESPN_STATUS_MAP = {
  STATUS_SCHEDULED:'TIMED', STATUS_IN_PROGRESS:'IN_PLAY',
  STATUS_HALFTIME:'PAUSED',  STATUS_FULL_TIME:'FINISHED',
  STATUS_FINAL:'FINISHED',   STATUS_END_PERIOD:'IN_PLAY',
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentGroups = [];
let knockoutMatches = [];
let scorersData = [];
let selectedId = "A";
let currentView = "grupos";
let pollingTimer = null;
let countdownTimer = null;
let espnTimer = null;
let countdown = 60;
let isLive = false;

// ─── LIVE STATUS HELPERS ─────────────────────────────────────────────────────
// A API pode atrasar até ~5 min para mudar de TIMED → IN_PLAY.
// Se o horário do jogo já passou há menos de 120 min, tratamos como "provável ao vivo".
function isMatchLive(m) {
  if (m.status === "IN_PLAY" || m.status === "PAUSED") return true;
  if (m.status === "TIMED") {
    const d = m.date || m.utcDate;
    if (!d) return false;
    const diff = Date.now() - new Date(d).getTime(); // ms desde início previsto
    return diff > 0 && diff < 120 * 60 * 1000; // entre 0 e 120 min atrás
  }
  return false;
}
function isMatchConfirmedLive(m) {
  return m.status === "IN_PLAY" || m.status === "PAUSED";
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",timeZone:"America/Sao_Paulo"});
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",timeZone:"America/Sao_Paulo"});
}

function isToday(iso) {
  const d = new Date(iso);
  const now = new Date();
  // Compara no fuso de Brasília (America/Sao_Paulo = UTC-3)
  const toBR = dt => dt.toLocaleDateString("pt-BR", { timeZone: "America/Sao_Paulo" });
  return toBR(d) === toBR(now);
}

function renderToday() {
  // Coleta todos os jogos de hoje de todos os grupos, ordenados por horário
  const todayMatches = [];
  for (const g of currentGroups) {
    for (const match of g.matches) {
      if (isToday(match.date)) {
        todayMatches.push({ ...match, groupId: g.id });
      }
    }
  }
  todayMatches.sort((a, b) => new Date(a.date) - new Date(b.date));

  const section = document.getElementById("today-section");
  if (!section) return;

  const todayLabel = new Date().toLocaleDateString("pt-BR", {
    weekday: "long", day: "numeric", month: "long", timeZone: "America/Sao_Paulo"
  });

  if (todayMatches.length === 0) {
    section.innerHTML = `<div class="today-section">
      <div class="today-header">
        <span class="today-title">Jogos de Hoje</span>
        <span class="today-date">${todayLabel}</span>
      </div>
      <p class="today-none">Nenhum jogo agendado para hoje.</p>
    </div>`;
    return;
  }

  const cards = todayMatches.map(match => {
    const live = isMatchLive(match);
    const confirmed = isMatchConfirmedLive(match);
    const finished = match.status === "FINISHED";
    const hasScore = match.hs !== null && match.as_ !== null;
    const hw = hasScore && match.hs > match.as_;
    const aw = hasScore && match.as_ > match.hs;

    const statusHtml = live
      ? confirmed
        ? `<span class="today-status live"><span class="dot live-red"></span>AO VIVO${match.minute ? ` · ${match.minute}'` : ""}</span>`
        : `<span class="today-status live"><span class="dot live-red"></span>EM ANDAMENTO</span>`
      : finished
        ? `<span class="today-status finished">Encerrado</span>`
        : `<span class="today-status scheduled">${fmtTime(match.date)}</span>`;

    const scoreHtml = hasScore
      ? `<span class="${hw ? "sw" : ""}">${match.hs}</span><span class="sep">–</span><span class="${aw ? "sw" : ""}">${match.as_}</span>`
      : `<span class="time">${fmtTime(match.date)}</span>`;

    const cls = live ? "is-live" : finished ? "is-finished" : "";

    const todayVenue = match.venue ? `<div class="today-venue">📍 ${match.venue}${match.venueCity?`, ${match.venueCity}`:""}</div>` : "";
    return `<div class="today-card ${cls}" onclick="selectGroup('${match.groupId}')">
      <div class="today-card-top">
        <span class="today-group-badge">GRUPO ${match.groupId}</span>
        ${statusHtml}
      </div>
      <div class="today-match-row">
        <div class="today-team${hw ? " winner" : ""}">
          <span>${match.home.flag}</span>
          <span class="today-team-name">${match.home.name}</span>
        </div>
        <div class="today-score">${scoreHtml}</div>
        <div class="today-team right${aw ? " winner" : ""}">
          <span class="today-team-name">${match.away.name}</span>
          <span>${match.away.flag}</span>
        </div>
      </div>
      ${todayVenue}
    </div>`;
  }).join("");

  section.innerHTML = `<div class="today-section">
    <div class="today-header">
      <span class="today-title">Jogos de Hoje</span>
      <span class="today-date">${todayLabel}</span>
    </div>
    <div class="today-grid">${cards}</div>
  </div>`;
}

function renderTabs() {
  const tabs = document.getElementById("group-tabs");
  tabs.innerHTML = currentGroups.map(g => {
    const hasLive = g.matches.some(m => isMatchLive(m));
    return `<button class="tab${g.id===selectedId?" active":""}" onclick="selectGroup('${g.id}')">
      ${g.id}${hasLive?`<span class="dot live-red"></span>`:""}
    </button>`;
  }).join("");
}

function renderStandings(group) {
  // Calcular forma (últimos 3 resultados) a partir das partidas
  function getForm(teamName, teamShort) {
    const played = group.matches
      .filter(m => m.status === "FINISHED" && m.hs !== null)
      .filter(m => m.home.name===teamName||m.home.short===teamShort||m.away.name===teamName||m.away.short===teamShort)
      .slice(-3);
    return played.map(m => {
      const isHome = m.home.name===teamName||m.home.short===teamShort;
      const gs = isHome?m.hs:m.as_, gc = isHome?m.as_:m.hs;
      return gs>gc?"w":gs===gc?"d":"l";
    });
  }

  const rows = group.standings.map((s,i) => {
    const rc = i<2?"row-q":i===2?"row-p":"row-o";
    const pc = ["p1","p2","p3","p4"][i]||"p4";
    const sg = s.sg>0?`+${s.sg}`:s.sg;
    const sgc = s.sg>0?" class='sg-pos'":s.sg<0?" class='sg-neg'":"";
    const form = getForm(s.team.name, s.team.short);
    const formHtml = form.length ? `<span class="form-dots">${form.map(r=>`<span class="fd fd-${r}" title="${r==='w'?'Vitória':r==='d'?'Empate':'Derrota'}"></span>`).join("")}</span>` : "";
    const logoHtml = s.team.crest
      ? `<img src="${s.team.crest}" class="team-logo-sm" onerror="this.style.display='none'">`
      : `<span class="flag">${s.team.flag}</span>`;
    return `<tr class="${rc}">
      <td class="c-pos"><span class="pos-b ${pc}">${i+1}</span></td>
      <td class="c-team">${logoHtml}<span class="tname">${s.team.name}</span><span class="tshort">${s.team.short}</span>${formHtml}</td>
      <td>${s.j}</td><td>${s.v}</td><td>${s.e}</td><td>${s.d}</td>
      <td>${s.gp}</td><td>${s.gc}</td>
      <td${sgc}>${sg}</td>
      <td class="c-pts"><strong>${s.pts}</strong></td>
    </tr>`;
  }).join("");

  return `<h2 class="sec-title">Classificação — ${group.name}</h2>
  <div class="std-wrap">
    <table class="std-table">
      <thead><tr>
        <th class="c-pos">Pos</th><th class="c-team">Seleção</th>
        <th title="Jogos">J</th><th title="Vitórias">V</th><th title="Empates">E</th><th title="Derrotas">D</th>
        <th title="Gols marcados">GP</th><th title="Gols sofridos">GC</th>
        <th title="Saldo">SG</th><th class="c-pts" title="Pontos">Pts</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <p class="note">1.° e 2.° de cada grupo + 8 melhores 3.° avançam para o mata-mata.</p>`;
}

function renderMatches(group) {
  const rounds = [1,2,3].map(rd => {
    const ms = group.matches.filter(m => m.rd === rd);
    const cards = ms.map(match => {
      const finished = match.status === "FINISHED";
      const live = isMatchLive(match);
      const confirmed = isMatchConfirmedLive(match);
      const hasScore = match.hs !== null && match.as_ !== null;
      const hw = hasScore && match.hs > match.as_;
      const aw = hasScore && match.as_ > match.hs;
      const infoHtml = live
        ? confirmed
          ? `<div class="live-badge"><span class="dot live-red"></span>AO VIVO${match.minute?` · ${match.minute}'`:""}</div>`
          : `<div class="live-badge"><span class="dot live-red"></span>EM ANDAMENTO</div>`
        : `<div class="match-info">${finished?fmtDate(match.date):`${fmtDate(match.date)} · ${fmtTime(match.date)}`}</div>`;
      const scoreHtml = hasScore
        ? `<span${hw?" class='score-w'":""}>${match.hs}</span><span class="score-sep">–</span><span${aw?" class='score-w'":""}>${match.as_}</span>`
        : `<span class="score-time">${fmtTime(match.date)}</span>`;
      const homeLogo = match.home.crest
        ? `<img src="${match.home.crest}" class="team-logo" onerror="this.outerHTML='<span class=flag>${match.home.flag}</span>'">`
        : `<span class="flag">${match.home.flag}</span>`;
      const awayLogo = match.away.crest
        ? `<img src="${match.away.crest}" class="team-logo" onerror="this.outerHTML='<span class=flag>${match.away.flag}</span>'">`
        : `<span class="flag">${match.away.flag}</span>`;
      const venueHtml = match.venue ? `<div class="match-venue">📍 ${match.venue}${match.venueCity?`, ${match.venueCity}`:""}</div>` : "";
      // Gols do card
      const goalsHtml = (finished || live) && (match.goals||[]).length
        ? `<div class="match-goals">${(match.goals||[]).map(g => {
            const isHome = (match.home.short === (g.team?.abbreviation||""));
            const ath = g.athletesInvolved?.[0];
            const name = ath?.shortName || ath?.displayName || "";
            const clock = g.clock?.displayValue || "";
            const pen = g.penaltyKick ? "(P)" : "";
            const og = g.ownGoal ? "(AG)" : "";
            return `<span class="mg${isHome?" mg-home":" mg-away"}">${isHome?"⚽":""}${name}${pen||og} ${clock}${isHome?"":" ⚽"}</span>`;
          }).join("")}</div>`
        : "";
      return `<div class="match-card${live?" is-live":""}">
        ${infoHtml}
        <div class="match-row">
          <span class="m-team${hw?" winner":""}">
            ${homeLogo}
            <span class="m-tname">${match.home.name}</span>
            <span class="m-tshort">${match.home.short}</span>
          </span>
          <div class="m-score">${scoreHtml}</div>
          <span class="m-team m-team-away${aw?" winner":""}">
            <span class="m-tshort">${match.away.short}</span>
            <span class="m-tname">${match.away.name}</span>
            ${awayLogo}
          </span>
        </div>
        ${goalsHtml}${venueHtml}
      </div>`;
    }).join("");
    return `<div class="round-section"><div class="round-label">Rodada ${rd}</div>${cards}</div>`;
  }).join("");

  return `<h2 class="sec-title">Partidas — ${group.name}</h2>
  <div class="match-list">${rounds}</div>`;
}

// ─── LIVE NOW BANNER ─────────────────────────────────────────────────────────
// htHome/htAway: placar do 1° tempo (null = 1° tempo ainda não terminou)
function calcPeriod(dateStr, status, htHome, htAway) {
  if (status === "PAUSED") return { label: "INTERVALO", elapsed: 45 };

  const totalElapsed = Math.floor((Date.now() - new Date(dateStr).getTime()) / 60000);

  // Se a API já registrou placar do HT → estamos no 2° tempo
  if (htHome !== null && htAway !== null) {
    // 2° tempo começa ~60 min após o início (45 min jogo + ~15 min intervalo)
    const secElapsed = Math.max(1, Math.min(totalElapsed - 60, 45));
    return { label: "2° TEMPO", elapsed: secElapsed };
  }

  // Ainda no 1° tempo (ou não há info de HT)
  if (totalElapsed <= 0) return { label: "INÍCIO", elapsed: 0 };
  // Limita a 45 na exibição (acréscimos do 1° tempo não ultrapassam muito)
  return { label: "1° TEMPO", elapsed: Math.min(totalElapsed, 52) };
}

function renderLiveNow() {
  const section = document.getElementById("live-now-section");
  const allMatches = [...currentGroups.flatMap(g => g.matches.map(m => ({...m, groupId: g.id}))),
                      ...knockoutMatches];
  const live = allMatches.filter(m => isMatchLive(m));
  if (!live.length) { section.classList.remove("visible"); return; }

  const cards = live.map(m => {
    const onclick = m.groupId ? `selectGroup('${m.groupId}')` : `setView('eliminatorias')`;
    const label = m.groupId ? `GRUPO ${m.groupId}` : (m.stageName || "MATA-MATA");

    // Dados ESPN (CORS aberto – placar/eventos mais precisos)
    const espn = espnLiveCache[`${m.home.short}-${m.away.short}`];

    // Placar: ESPN tem prioridade
    const scoreHome = (espn?.homeScore != null) ? espn.homeScore : (m.hs ?? "-");
    const scoreAway = (espn?.awayScore != null) ? espn.awayScore : (m.as_ ?? "-");

    // Período / relógio via ESPN
    let periodLabel, clockDisplay;
    if (espn) {
      const st = espn.status;
      if (st === "STATUS_HALFTIME") {
        periodLabel = "INTERVALO"; clockDisplay = espn.clock || "HT";
      } else if (st === "STATUS_FINAL" || st === "STATUS_FULL_TIME") {
        periodLabel = "ENCERRADO"; clockDisplay = "FT";
      } else if (espn.period === 2) {
        periodLabel = "2° TEMPO"; clockDisplay = espn.clock;
      } else {
        periodLabel = "1° TEMPO"; clockDisplay = espn.clock;
      }
    } else {
      const {label: pl, elapsed: pe} = calcPeriod(m.date, m.status, m.ht_home, m.ht_away);
      periodLabel = pl; clockDisplay = `~${pe}'`;
    }

    const isHalftime = periodLabel === "INTERVALO";
    const elapsedHtml = isHalftime
      ? `<span class="ln-elapsed" style="font-size:13px">HT</span>`
      : `<span class="ln-elapsed">${clockDisplay}</span>`;

    // Team logos
    function teamImg(t) {
      return t.crest
        ? `<img src="${t.crest}" class="ln-team-crest" onerror="this.outerHTML='<span class=ln-team-flag>${t.flag}</span>'">`
        : `<span class="ln-team-flag">${t.flag}</span>`;
    }

    // HT score sub-label
    const htHtml = isHalftime
      ? `<span class="ln-score-ht">Intervalo</span>`
      : (m.ht_home !== null && m.ht_away !== null && periodLabel === "2° TEMPO")
        ? `<span class="ln-score-ht">1° T: ${m.ht_home}–${m.ht_away}</span>`
        : "";

    // Meta chips
    const rdLabel = m.rd ? `Rodada ${m.rd}` : (m.stageName || "");
    const chips = [
      rdLabel ? `<span class="ln-meta-chip">📋 ${rdLabel}</span>` : "",
      venueChip,
      m.referee ? `<span class="ln-meta-chip">🟡 ${m.referee}</span>` : "",
    ].filter(Boolean).join("");

    // Eventos: usa dados do match (injetados pelo espnTick) ou cache ESPN direto
    const mGoals   = m.goals   || espn?.goals   || [];
    const mYellows = m.yellows || espn?.yellows  || [];
    const mReds    = m.reds    || espn?.reds     || [];
    let eventsHtml = "";
    {
      const homeAbbr = m.home.short;
      const awayAbbr = m.away.short;
      const allEvents = [
        ...mGoals.map(d => ({...d, _t:"goal"})),
        ...mYellows.map(d => ({...d, _t:"yellow"})),
        ...mReds.map(d => ({...d, _t:"red"})),
      ].sort((a,b) => (a.clock?.value||0) - (b.clock?.value||0));

      if (allEvents.length) {
        const evRows = allEvents.map(d => {
          const clk   = d.clock?.displayValue || "";
          const ath   = d.athletesInvolved?.[0];
          const name  = ath?.shortName || ath?.displayName || "?";
          const tAbbr = d.team?.abbreviation || "";
          const isHome = tAbbr === homeAbbr;
          const icon = d._t === "goal"
            ? (d.ownGoal ? "⚽ AG" : d.penaltyKick ? "⚽ (P)" : "⚽")
            : d._t === "yellow" ? "🟡" : "🔴";
          const side = isHome ? homeAbbr : awayAbbr;
          return `<div class="ln-event">
            <span class="ln-event-min">${clk}</span>
            <span class="ln-event-icon">${icon}</span>
            <span class="ln-event-name">${name}</span>
            <span class="ln-event-team">${side}</span>
          </div>`;
        }).join("");
        eventsHtml = `<div class="ln-events">
          <div class="ln-events-title">⚽ Gols &amp; Cartões</div>
          ${evRows}
        </div>`;
      }
    }

    // Estádio
    const venueChip = m.venue
      ? `<span class="ln-meta-chip">📍 ${m.venue}${m.venueCity ? `, ${m.venueCity}` : ""}</span>`
      : "";

    // Mini group standings
    let standingsHtml = "";
    if (m.groupId) {
      const grp = currentGroups.find(g => g.id === m.groupId);
      if (grp && grp.standings.length) {
        const rows = grp.standings.map(s => {
          const isPlaying = s.team.short === m.home.short || s.team.short === m.away.short;
          const adv = s.pos <= 2 ? `style="border-left:2px solid var(--accent)"` : "";
          const crestImg = s.team.crest
            ? `<img src="${s.team.crest}" style="width:14px;height:14px;object-fit:contain;vertical-align:middle" onerror="this.outerHTML='${s.team.flag}'">`
            : s.team.flag;
          return `<tr class="${isPlaying?"ln-playing":""}">
            <td ${adv}>${s.pos}</td>
            <td>${crestImg} ${s.team.short}</td>
            <td>${s.pts}</td>
            <td style="color:var(--text-3);font-size:11px">${s.j}j ${s.sg>0?"+":""}${s.sg}</td>
          </tr>`;
        }).join("");
        standingsHtml = `<div class="ln-table-wrap">
          <div class="ln-table-title">Classificação — Grupo ${m.groupId}</div>
          <table class="ln-table"><tbody>${rows}</tbody></table>
        </div>`;
      }
    }

    return `<div class="live-now-card" onclick="${onclick}">
      <div class="ln-header">
        <div class="ln-live-pill"><span class="dot live-red"></span>${label}</div>
        <div style="display:flex;align-items:center;gap:8px">
          ${elapsedHtml}
          <span class="ln-period">${periodLabel}</span>
        </div>
      </div>
      <div class="ln-score-area">
        <div class="ln-team">
          ${teamImg(m.home)}
          <div class="ln-team-short">${m.home.short}</div>
          <div class="ln-team-name">${m.home.name}</div>
        </div>
        <div class="ln-score-center">
          <div class="ln-score-main">
            <span>${scoreHome}</span>
            <span class="ln-score-sep">–</span>
            <span>${scoreAway}</span>
          </div>
          ${htHtml}
        </div>
        <div class="ln-team">
          ${teamImg(m.away)}
          <div class="ln-team-short">${m.away.short}</div>
          <div class="ln-team-name">${m.away.name}</div>
        </div>
      </div>
      ${chips ? `<div class="ln-meta">${chips}</div>` : ""}
      ${eventsHtml}
      ${standingsHtml}
    </div>`;
  }).join("");

  const espnTime = new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZone:"America/Sao_Paulo"});
  section.innerHTML = `<div class="live-now-title">
    <span class="dot live-red"></span>JOGOS AO VIVO AGORA
    <span style="margin-left:auto;font-size:10px;font-weight:500;color:var(--text-3);letter-spacing:0">atualizado ${espnTime}</span>
  </div>
  <div class="live-now-grid">${cards}</div>`;
  section.classList.add("visible");
}

// ─── BRACKET VIEW ────────────────────────────────────────────────────────────
let koSubView = "lista"; // "lista" | "chaveamento"

function setKoSubView(v) {
  koSubView = v;
  document.getElementById("bk-tbtn-lista").classList.toggle("active", v==="lista");
  document.getElementById("bk-tbtn-chav").classList.toggle("active", v==="chaveamento");

function bkCard(m, wide) {
  if (!m) {
    return `<div class="bk-card bk-tbd${wide?" bk-final-card":""}">
      <div class="bk-trow tbd"><div class="bk-ti"><span class="bk-tfl">❓</span><span class="bk-tn">A definir</span></div></div>
      <div class="bk-div"></div>
      <div class="bk-trow tbd"><div class="bk-ti"><span class="bk-tfl">❓</span><span class="bk-tn">A definir</span></div></div>
    </div>`;
  }
  const live = isMatchLive(m);
  const confirmed = isMatchConfirmedLive(m);
  const done = m.status === "FINISHED";
  // Só mostra placar se o jogo já começou
  const has = done || live || (m.hs !== null && m.as_ !== null && m.status !== "TIMED");
  const hw = has && m.hs > m.as_, aw = has && m.as_ > m.hs;

  function tr(team, score, win) {
    const known = team?.name && team.name !== "A definir";
    const logo = known && team.crest
      ? `<img src="${team.crest}" class="bk-tcrest" onerror="this.outerHTML='<span class=bk-tfl>${team.flag||""}</span>'">`
      : `<span class="bk-tfl">${known ? (team.flag || "🏳") : "❓"}</span>`;
    return `<div class="bk-trow${win?" winner":""}${!known?" tbd":""}">
      <div class="bk-ti">${logo}<span class="bk-tn">${known ? team.name : "A definir"}</span></div>
      ${has && known ? `<span class="bk-sc${win?" gol":""}">${score ?? "–"}</span>` : ""}
    </div>`;
  }

  const { label: _pl, elapsed: _pe } = calcPeriod(m.date, m.status, m.ht_home, m.ht_away);
  const liveLabel = m.status === "PAUSED" ? "⏸ INTERVALO"
    : confirmed ? `▶ ${_pl} ~${_pe}'` : "▶ EM ANDAMENTO";

  const timeBar = !has && !live
    ? `<div class="bk-time-bar">${fmtDate(m.date)} · ${fmtTime(m.date)}</div>` : "";

  const cls = `bk-card${live?" bk-live":done?" bk-done":""}${wide?" bk-final-card":""}`;
  return `<div class="${cls}">
    ${live ? `<div class="bk-live-bar"><span class="dot live-red"></span>${liveLabel}</div>` : ""}
    ${tr(m.home, m.hs, hw)}
    <div class="bk-div"></div>
    ${tr(m.away, m.as_, aw)}
    ${timeBar}
  </div>`;
}

function bkCol(matches, pairSide, lblTxt, lblCls) {
  const pairs = [];
  for (let i = 0; i < matches.length; i += 2) pairs.push([matches[i], matches[i+1] || null]);
  const pairsHtml = pairs.map(([a,b]) => `<div class="bk-pair ${pairSide}">
    <div class="bk-slot">${bkCard(a)}</div>
    <div class="bk-slot">${bkCard(b)}</div>
  </div>`).join("");
  return `<div class="bk-round-wrap">
    <div class="bk-round-lbl ${lblCls}">${lblTxt}</div>
    <div class="bk-col">${pairsHtml}</div>
  </div>`;
}

function bkSingle(m, side, lblTxt, lblCls) {

  { key: "LAST_32",       label: "Rodada de 32" },
  { key: "LAST_16",       label: "Oitavas de Final" },
  { key: "QUARTER_FINALS",label: "Quartas de Final" },

function renderKnockout() {
  const view = document.getElementById("knockout-view");

  // Toggle header always present

    <button class="bk-tbtn${koSubView==="lista"?" active":""}" id="bk-tbtn-lista" onclick="setKoSubView('lista')">☰ Lista</button>

  </div>`;

  if (!knockoutMatches.length) {
    view.innerHTML = toggleHtml + `<p style="color:var(--text-3);padding:32px 0;text-align:center">
      As partidas eliminatórias serão definidas após a fase de grupos.<br>
      <small>Começa em 28 de junho de 2026</small></p>`;
    return;
  }

  const PHASE_META = {
    LAST_32:       { cls:"r32",   gridCls:"g3", icon:"⚔️" },
    LAST_16:       { cls:"r16",   gridCls:"g3", icon:"🎯" },
    QUARTER_FINALS:{ cls:"qf",    gridCls:"g2", icon:"🔥" },
    SEMI_FINALS:   { cls:"sf",    gridCls:"g2", icon:"⭐" },
    THIRD_PLACE:   { cls:"final", gridCls:"g1", icon:"🥉" },
    FINAL:         { cls:"final", gridCls:"g1", icon:"🏆" },
  };

  function koMatchCard(m, isFinal) {
    const live = m.status === "IN_PLAY" || m.status === "PAUSED";
    const done = m.status === "FINISHED";
    const hasScore = m.hs !== null && m.as_ !== null;
    const hw = hasScore && m.hs > m.as_;
    const aw = hasScore && m.as_ > m.hs;
    const homeKnown = m.home.name && m.home.name !== "A definir";
    const awayKnown = m.away.name && m.away.name !== "A definir";

    // Top bar
    const dateStr = live
      ? `<div class="ko-live-badge"><span class="dot live-red"></span>AO VIVO</div>`
      : `<div class="ko-date">${done ? fmtDate(m.date) : `${fmtDate(m.date)} · ${fmtTime(m.date)}`}</div>`;
    const venueStr = m.venue
      ? `<div class="ko-venue">📍 ${m.venue}${m.venueCity ? `, ${m.venueCity}` : ""}</div>`
      : "";

    // Team crest/flag
    function teamImg(team, sz=44) {
      if (team.crest)
        return `<img src="${team.crest}" class="ko-crest" style="width:${sz}px;height:${sz}px" onerror="this.outerHTML='<span class=ko-crest-flag>${team.flag||"⚽"}</span>'">`;
      return `<span class="ko-crest-flag">${team.flag || "⚽"}</span>`;
    }

    const crestSz = isFinal ? 56 : 44;
    const homeImg  = homeKnown ? teamImg(m.home, crestSz) : `<span style="font-size:32px;opacity:.3">?</span>`;
    const awayImg  = awayKnown ? teamImg(m.away, crestSz) : `<span style="font-size:32px;opacity:.3">?</span>`;

    // Score
    let scoreCenterHtml;
    if (hasScore) {
      scoreCenterHtml = `<div class="ko-score-big">
        <span class="${hw?"ko-score-win":""}">${m.hs}</span>
        <span class="sep">–</span>
        <span class="${aw?"ko-score-win":""}">${m.as_}</span>
      </div>`;
    } else {
      const timeLabel = done ? "FT" : fmtTime(m.date);
      scoreCenterHtml = `<div class="ko-score-time">${timeLabel}</div>`;
    }

    return `<div class="ko-card${live?" ko-live":""}${isFinal?" final-card":""}">
      <div class="ko-card-top">${dateStr}${venueStr}</div>
      <div class="ko-match-body">
        <div class="ko-team-block">
          ${homeImg}
          <div class="ko-team-name${!homeKnown?" tbd":""}${hw?" winner":""}">${homeKnown ? m.home.name : "A definir"}</div>
        </div>
        <div class="ko-score-center">${scoreCenterHtml}</div>
        <div class="ko-team-block right">
          ${awayImg}
          <div class="ko-team-name${!awayKnown?" tbd":""}${aw?" winner":""}">${awayKnown ? m.away.name : "A definir"}</div>
        </div>
      </div>
    </div>`;
  }

  const listaHtml = KO_STAGES.map(({ key, label }) => {
    const ms = knockoutMatches.filter(m => m.stage === key);
    if (!ms.length) return "";
    const meta = PHASE_META[key] || { cls:"r32", gridCls:"g3", icon:"" };
    const isFinal = key === "FINAL" || key === "THIRD_PLACE";
    const iconHtml = `<span class="ko-phase-icon" style="font-size:20px;filter:drop-shadow(0 0 4px rgba(255,255,255,.2))">${meta.icon}</span>`;
    const cards = ms.map(m => koMatchCard(m, isFinal)).join("");
    return `<div class="ko-phase ${meta.cls}">
      <div class="ko-phase-header">
        ${iconHtml}
        <div>
          <div class="ko-phase-title">${label}</div>
        </div>
        <div class="ko-phase-count">${ms.length} ${ms.length===1?"jogo":"jogos"}</div>
      </div>
      <div class="ko-grid ${meta.gridCls}">${cards}</div>
    </div>`;
  }).join("");

  view.innerHTML = toggleHtml
    + `<div id="ko-lista" style="${koSubView==="lista"?"":"display:none"}">${listaHtml}</div>`
    + `<div id="ko-bracket" style="${koSubView==="chaveamento"?"":"display:none"}"></div>`;

  if (koSubView==="chaveamento") renderBracket();
}

// ─── FOTOS VIA WIKIPEDIA ─────────────────────────────────────────────────────
const playerPhotoCache = {};

async function fetchPlayerPhotos(names) {
  const needed = names.filter(n => !(n in playerPhotoCache));
  if (!needed.length) return;

  // Wikipedia permite até 50 títulos por request; divide em lotes se necessário
  const chunks = [];
  for (let i = 0; i < needed.length; i += 30) chunks.push(needed.slice(i, i + 30));

  for (const chunk of chunks) {
    try {
      const titles = chunk.map(n => encodeURIComponent(n)).join("|");
      const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${titles}&prop=pageimages&format=json&pithumbsize=120&origin=*`;
      const r = await fetch(url);
      const d = await r.json();
      const pages = d?.query?.pages || {};
      // Mapeia título normalizado → URL da foto
      const normalized = {};
      for (const n of (d?.query?.normalized || [])) normalized[n.to] = n.from;
      for (const page of Object.values(pages)) {
        const originalName = normalized[page.title] || page.title;
        playerPhotoCache[originalName] = page.thumbnail?.source || null;
        // Tenta casar com o nome original da lista
        const match = chunk.find(n => n === originalName || n.toLowerCase() === originalName.toLowerCase());
        if (match) playerPhotoCache[match] = page.thumbnail?.source || null;
      }
      // Marca como null os não encontrados
      for (const n of chunk) if (!(n in playerPhotoCache)) playerPhotoCache[n] = null;
    } catch(e) {
      for (const n of chunk) playerPhotoCache[n] = null;
    }
  }
}

// ─── ESPN LIVE LOOP (15s) — scores, gols, cartões ────────────────────────────
let espnLiveCache = {}; // chave: "HTLA-ATLA"

async function fetchESPNEvents() {
  try {
    const r = await fetch(ESPN_LIVE);
    if (!r.ok) return;
    const data = await r.json();
    const newCache = {};
    for (const event of data.events || []) {
      const comp = event.competitions?.[0];
      if (!comp) continue;
      const home = comp.competitors?.find(t => t.homeAway === 'home');
      const away = comp.competitors?.find(t => t.homeAway === 'away');
      if (!home || !away) continue;
      const details = comp.details || [];
      newCache[`${home.team.abbreviation}-${away.team.abbreviation}`] = {
        homeScore: home.score != null ? parseInt(home.score) : null,
        awayScore: away.score != null ? parseInt(away.score) : null,
        status: comp.status?.type?.name || '',
        clock:  comp.status?.displayClock || '',
        period: comp.status?.period ?? null,
        goals:   details.filter(d => d.scoringPlay),
        yellows: details.filter(d => d.yellowCard && !d.redCard),
        reds:    details.filter(d => d.redCard),
      };
    }
    espnLiveCache = newCache;
  } catch { /* mantém cache anterior */ }
}

async function espnTick() {
  await fetchESPNEvents();
  // Injeta scores ESPN nos grupos já carregados
  for (const [key, espn] of Object.entries(espnLiveCache)) {
    const st = ESPN_STATUS_MAP[espn.status] || "TIMED";
    if (st === "TIMED" && espn.status !== "STATUS_IN_PROGRESS" && espn.status !== "STATUS_HALFTIME") continue;
    const [htla, atla] = key.split("-");
    for (const g of currentGroups) {
      for (const match of g.matches) {
        if (match.home.short === htla && match.away.short === atla) {
          match.status = ESPN_STATUS_MAP[espn.status] || match.status;
          if (espn.homeScore != null) match.hs  = espn.homeScore;
          if (espn.awayScore != null) match.as_ = espn.awayScore;
          match.goals   = espn.goals;
          match.yellows = espn.yellows;
          match.reds    = espn.reds;
        }
      }
    }
  }
  renderLiveNow();
}

function startESPNLoop() {
  if (espnTimer) return;
  espnTick();
  espnTimer = setInterval(espnTick, 15000);
}
function stopESPNLoop() { clearInterval(espnTimer); espnTimer = null; }

// ─── MAIN DATA FETCH (ESPN — sem proxy) ──────────────────────────────────────
let _fetchCycle  = 0;
let _lastFullFetch = 0;

async function fetchAllData(forceFullRefresh = false) {
  setLoading(true);
  _fetchCycle++;
  const now = Date.now();
  const doFull = forceFullRefresh || _fetchCycle === 1 || (now - _lastFullFetch > 90000);
  clearInterval(pollingTimer);

  try {
    if (doFull) {
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 12000); // 12s timeout
      const [stRes, scRes] = await Promise.all([
        fetch(ESPN_ST,  { signal: ctrl.signal }),
        fetch(ESPN_ALL, { signal: ctrl.signal }),
      ]);
      clearTimeout(timeout);
      if (!stRes.ok) throw new Error(`Standings ESPN: ${stRes.status}`);
      if (!scRes.ok) throw new Error(`Scoreboard ESPN: ${scRes.status}`);
      const [stData, scData] = await Promise.all([stRes.json(), scRes.json()]);
      parseESPNData(stData, scData);
      _lastFullFetch = now;
    }
    hideError();
    updateLastUpdated(new Date());

    const hasLive = currentGroups.some(g => g.matches.some(m => isMatchLive(m)));
    countdown = hasLive ? 60 : 120;
    pollingTimer = setInterval(() => fetchAllData(), hasLive ? 60000 : 120000);
  } catch(e) {
    const msg = e.name === "AbortError" ? "Tempo esgotado (ESPN lento). Tentando novamente…" : e.message;
    showError(`ESPN: ${msg}`);
    // Retry em 30s mesmo com erro
    countdown = 30;
    pollingTimer = setInterval(() => fetchAllData(true), 30000);
  } finally {
    setLoading(false);
  }
}

// Bandeira por TLA (ESPN não fornece emojis)
function getFlag(name, tla) { return FLAG_MAP[(tla||"").toUpperCase()] || ""; }

// Fase do mata-mata: usa abreviações ESPN (mais preciso que datas)
// ESPN: RD32=classificado p/ R32, RD16 Wx=ganhou R32, QFWx=ganhou R16, SFWx/SF Lx=ganhou/perdeu QF
function getKOStageFromAbbr(ha, aa) {
  const check = s => s && (ha.startsWith(s) || aa.startsWith(s));
  if (check("SFW") || check("SF L") || check("SF W")) return null; // usa data p/ distinguir 3P vs Final
  if (check("QFW"))  return {stage:"SEMI_FINALS",    label:"Semifinal"};
  if (check("RD16")) return {stage:"QUARTER_FINALS", label:"Quartas de Final"};
  if (check("RD32")) return {stage:"LAST_16",        label:"Oitavas de Final"};
  return               {stage:"LAST_32",             label:"Rodada de 32"};
}
function getKOStageByDate(dateStr) {
  const d = new Date(dateStr), mo = d.getUTCMonth()+1, dy = d.getUTCDate();
  if (mo === 7 && dy === 18) return {stage:"THIRD_PLACE", label:"3.° Lugar"};
  if (mo === 7 && dy >= 19)  return {stage:"FINAL",       label:"Final"};
  return                            {stage:"FINAL",        label:"Final"};
}

// Converte dados ESPN → formato interno
function parseESPNData(stData, scData) {
  // 1. Standings: teamId → grupo + classificação
  const teamToGroup = {};
  const groupStMap  = {};
  for (const grp of stData.children || []) {
    const gl = (grp.name.match(/Group ([A-L])/) || [])[1] || grp.abbreviation;
    groupStMap[gl] = [];
    for (const entry of grp.standings?.entries || []) {
      const team = entry.team;
      teamToGroup[team.id] = gl;
      const st = {};
      for (const s of entry.stats || []) st[s.name] = s.displayValue;
      const sg = parseInt((st.pointDifferential||"0").replace("+","")) || 0;
      groupStMap[gl].push({
        pos: parseInt(st.rank) || 99,
        team: { id: team.id, name: team.displayName, short: team.abbreviation,
                flag: getFlag("", team.abbreviation),
                crest: team.logos?.[0]?.href || "" },
        pts: parseInt(st.points) || 0,
        j:   parseInt(st.gamesPlayed) || 0,
        v:   parseInt(st.wins)  || 0,
        e:   parseInt(st.ties)  || 0,
        d:   parseInt(st.losses)|| 0,
        gp:  parseInt(st.pointsFor)     || 0,
        gc:  parseInt(st.pointsAgainst) || 0,
        sg,
      });
    }
    groupStMap[gl].sort((a,b) => a.pos - b.pos);
  }

  // 2. Partidas + artilheiros
  const matchesByGroup = {};
  const koList = [];
  const scorerMap  = {};   // { athleteId: { player, team, goals, matchSet } }

  for (const event of scData.events || []) {
    const comp = event.competitions?.[0];
    if (!comp) continue;
    const hComp = comp.competitors?.find(t => t.homeAway === "home");
    const aComp = comp.competitors?.find(t => t.homeAway === "away");
    if (!hComp || !aComp) continue;

    const hT = hComp.team, aT = aComp.team;
    const espnSt   = comp.status?.type?.name || "STATUS_SCHEDULED";
    const status   = ESPN_STATUS_MAP[espnSt] || "TIMED";
    // Só usa placar se o jogo já começou (evita mostrar 0-0 em jogos agendados)
    const gameStarted = espnSt !== "STATUS_SCHEDULED" && espnSt !== "STATUS_POSTPONED";
    const hs  = (gameStarted && hComp.score != null) ? parseInt(hComp.score) : null;
    const as_ = (gameStarted && aComp.score != null) ? parseInt(aComp.score) : null;
    const venue    = comp.venue || {};
    const details  = comp.details || [];
    const goals    = details.filter(d => d.scoringPlay);
    const yellows  = details.filter(d => d.yellowCard && !d.redCard);
    const reds     = details.filter(d => d.redCard);

    // Artilheiros: acumula por torneio
    for (const det of goals) {
      if (det.ownGoal) continue;
      const ath = det.athletesInvolved?.[0];
      if (!ath) continue;
      const pTeam = det.team?.id === hT.id ? hT : aT;
      if (!scorerMap[ath.id]) {
        scorerMap[ath.id] = {
          player: { name: ath.displayName, shortName: ath.shortName || ath.displayName },
          team:   { name: pTeam.displayName, tla: pTeam.abbreviation,
                    crest: pTeam.logos?.[0]?.href || "" },
          goals: 0, assists: 0, matchSet: new Set(),
        };
      }
      scorerMap[ath.id].goals++;
      scorerMap[ath.id].matchSet.add(event.id);
    }

    // Time é "real" se o TLA está no FLAG_MAP (48 times da Copa 2026)
    // Placeholders ESPN como "RD32", "1I", "QFW1", "3RD" não estão no mapa
    const isRealTeam = tla => !!(tla && FLAG_MAP[tla] !== undefined);
    const parsed = {
      id: event.id, date: comp.date || event.date, rd: null,
      home: { name: isRealTeam(hT.abbreviation) ? hT.displayName : "A definir",
              short: isRealTeam(hT.abbreviation) ? hT.abbreviation : "???",
              flag: getFlag("", hT.abbreviation), crest: hT.logos?.[0]?.href || "" },
      away: { name: isRealTeam(aT.abbreviation) ? aT.displayName : "A definir",
              short: isRealTeam(aT.abbreviation) ? aT.abbreviation : "???",
              flag: getFlag("", aT.abbreviation), crest: aT.logos?.[0]?.href || "" },
      hs, as_, ht_home: null, ht_away: null,
      status, minute: null, referee: null,
      venue: venue.fullName || "", venueCity: venue.address?.city || "",
      goals, yellows, reds,
    };

    // Grupo stage: AMBOS os times devem estar no MESMO grupo.
    // Se apenas um está (ex: mata-mata onde ESPN resolveu 1 time real), é knockout.
    const homeGroup = teamToGroup[hT.id];
    const awayGroup = teamToGroup[aT.id];
    const gl = (homeGroup && homeGroup === awayGroup) ? homeGroup : null;

    if (gl) {
      if (!matchesByGroup[gl]) matchesByGroup[gl] = [];
      matchesByGroup[gl].push(parsed);
    } else {
      const ko = getKOStageFromAbbr(hT.abbreviation, aT.abbreviation)
              || getKOStageByDate(parsed.date);
      koList.push({...parsed, stage: ko.stage, stageName: ko.label});
    }
  }

  // Atribui rodada (rd): cada grupo tem exatamente 6 jogos = 3 rodadas de 2
  for (const gl in matchesByGroup) {
    matchesByGroup[gl]
      .sort((a,b) => new Date(a.date) - new Date(b.date))
      .forEach((m,i) => { m.rd = Math.floor(i/2)+1; });
  }

  knockoutMatches = koList.sort((a,b) => new Date(a.date) - new Date(b.date));
  scorersData = Object.values(scorerMap)
    .map(s => ({...s, playedMatches: s.matchSet.size}))
    .sort((a,b) => b.goals - a.goals);

  // Monta currentGroups A–L
  currentGroups = "ABCDEFGHIJKL".split("").map(gl => ({
    id: gl, name: `Grupo ${gl}`,
    standings: groupStMap[gl] || [],
    matches: (matchesByGroup[gl] || []).sort((a,b) =>
      a.rd !== b.rd ? a.rd - b.rd : new Date(a.date) - new Date(b.date)),
  }));

  // Garante selectedId válido
  if (!currentGroups.find(g => g.id === selectedId && g.standings.length)) {
    selectedId = currentGroups.find(g => g.standings.length)?.id || "A";
  }
  render();
}

function updateLastUpdated(date) {
  const t = date.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  document.getElementById("last-upd").textContent = `ESPN · ${t}`;
}

// ─── LIVE MODE ────────────────────────────────────────────────────────────────
function startLiveMode() {
  isLive = true;
  document.getElementById("live-off").style.display = "none";
  document.getElementById("live-on").style.display = "flex";
  // Busca full ESPN e inicia loop de scores ao vivo
  fetchAllData(true);
  startESPNLoop();
  countdownTimer = setInterval(() => {
    countdown = Math.max(1, countdown - 1);
    const lbl = document.getElementById("live-label");
    if (lbl) lbl.textContent = `Ao vivo · ESPN · atualiza em ${countdown}s`;
  }, 1000);
}

function stopLiveMode() {
  isLive = false;
  clearInterval(pollingTimer);
  clearInterval(countdownTimer);
  stopESPNLoop();
  pollingTimer = null; countdownTimer = null;
  document.getElementById("live-on").style.display = "none";
  render();
}

function manualRefresh() { _fetchCycle = 0; fetchAllData(true); countdown = 60; }

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Carrega dados ESPN imediatamente (sem precisar de chave)

}
